<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crucigramas | EducaTec</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .crossword-grid { display:inline-grid; gap:2px; }
    .cw-cell { width:36px;height:36px;position:relative;background:white;border:2px solid #ccc;border-radius:4px; }
    .cw-cell.black { background:#222;border-color:#222; }
    .cw-cell input { width:100%;height:100%;border:none;background:transparent;text-align:center;font-weight:700;font-size:0.95rem;text-transform:uppercase;color:var(--dark);padding:0;cursor:pointer; }
    .cw-cell input:focus { outline:none;background:#fff9c4; }
    .cw-cell .num { position:absolute;top:1px;left:2px;font-size:0.5rem;font-weight:700;color:var(--primary);line-height:1;pointer-events:none; }
    .clue-item { display:flex;gap:8px;margin-bottom:8px;font-size:0.9rem; }
    .clue-num { font-weight:700;color:var(--primary);min-width:24px; }
    .clue-text { color:var(--gray); }
  </style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="EducatecLog.jpg" alt="EducaTec" style="height:44px;width:auto;object-fit:contain;border-radius:8px;flex-shrink:0;">
      <div><div class="logo-text">EducaTec</div><div class="logo-sub" id="sidebar-sub">Panel</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebar-user-avatar">U</div>
        <div><div class="user-name" id="sidebar-user-name">Usuario</div><div class="user-role" id="sidebar-user-role">Usuario</div></div>
      </div>
      <button onclick="cerrarSesion()" class="btn btn-danger btn-sm btn-block" style="margin-top:12px;">🚪 Cerrar Sesión</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">🧩 Crucigramas</div>
      <div class="topbar-actions">
        <button class="btn-menu" onclick="toggleSidebar()">☰</button>
        <div class="uso-counter" style="margin:0;padding:8px 16px;">
          <span class="label">Usos:</span>
          <span class="nums"><span id="cw-usados">—</span> / 20</span>
        </div>
      </div>
    </div>
    <div class="page-content">
      <div style="display:grid;grid-template-columns:360px 1fr;gap:24px;align-items:start;">

        <!-- PANEL CONFIG -->
        <div class="card">
          <div class="card-title">⚙️ Configurar Crucigrama</div>
          <div class="form-group">
            <label>Título</label>
            <input type="text" id="cw-titulo" class="form-control" value="Mi Crucigrama">
          </div>
          <div class="form-group">
            <label>Palabras y pistas</label>
            <div id="cw-words-container"></div>
            <button onclick="addCwWord()" class="btn btn-outline btn-sm btn-block" style="margin-top:8px;">+ Agregar palabra</button>
          </div>
          <button onclick="generarCrucigrama()" class="btn btn-primary btn-block" style="margin-top:4px;">🎲 Generar Crucigrama</button>
          <button onclick="loadCwEjemplo()" class="btn btn-outline btn-block" style="margin-top:8px;">📋 Cargar ejemplo</button>
        </div>

        <!-- PANEL RESULTADO -->
        <div class="card">
          <div id="cw-placeholder" style="text-align:center;padding:60px 20px;color:var(--gray);">
            <div style="font-size:4rem;opacity:0.3;">🧩</div>
            <p style="margin-top:12px;">Configura tus palabras y genera el crucigrama</p>
          </div>
          <div id="cw-result" style="display:none;">
            <h3 id="cw-result-title" style="margin-bottom:16px;font-size:1.2rem;"></h3>
            <div style="overflow-x:auto;"><div class="crossword-grid" id="cw-grid"></div></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:20px;">
              <div><h4 style="margin-bottom:10px;">➡️ Horizontales</h4><div id="cw-across"></div></div>
              <div><h4 style="margin-bottom:10px;">⬇️ Verticales</h4><div id="cw-down"></div></div>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;">
              <button onclick="checkCW()" class="btn btn-primary btn-sm">✅ Verificar</button>
              <button onclick="clearCW()" class="btn btn-outline btn-sm">🗑️ Limpiar</button>
              <button onclick="window.print()" class="btn btn-gray btn-sm">🖨️ Imprimir</button>
            </div>
            <div id="cw-autosave-status" style="margin-top:10px;font-size:0.82rem;color:var(--gray);"></div>
          </div>
        </div>
      </div>

      <!-- HISTORIAL -->
      <div class="card" style="margin-top:24px;">
        <div class="card-title">📋 Historial de Crucigramas</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Título</th><th>Palabras</th><th>Fecha</th><th>Acciones</th></tr></thead>
            <tbody id="tbody-cw"><tr><td colspan="5" style="text-align:center;padding:30px;color:var(--gray);">Cargando...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/app.js"></script>
<script>
let cwState = { grid:[], rows:0, cols:0, placedWords:[], revealed:false };
let currentCWData = null;

document.addEventListener("DOMContentLoaded", async () => {
  if (!Auth.isLogged()) { window.location.href = "index.html"; return; }
  renderSidebarUser(); renderSidebar();
  addCwWord(); addCwWord(); addCwWord();
  await cargarContadorCW(); await cargarHistorialCW();
});

function renderSidebar() {
  const rol = Auth.getRol();
  document.getElementById("sidebar-sub").textContent = rol === "maestro" ? "Panel Maestro" : "Panel Usuario";
  const nav = document.getElementById("sidebar-nav");
  if (rol === "maestro") {
    nav.innerHTML = `<div class="nav-section">Principal</div><a href="dashboard.html" class="nav-item"><span class="icon">📊</span> Dashboard</a><a href="usuarios.html" class="nav-item"><span class="icon">👥</span> Mis Usuarios</a><div class="nav-section">Herramientas</div><a href="sopas.html" class="nav-item"><span class="icon">🔠</span> Sopas de Letras</a><a href="crucigramas.html" class="nav-item active"><span class="icon">🧩</span> Crucigramas</a><a href="ahorcado.html" class="nav-item"><span class="icon">🪢</span> Ahorcado</a>`;
  } else {
    nav.innerHTML = `<div class="nav-section">Mis Actividades</div><a href="sopas.html" class="nav-item"><span class="icon">🔠</span> Sopas de Letras</a><a href="crucigramas.html" class="nav-item active"><span class="icon">🧩</span> Crucigramas</a><a href="ahorcado.html" class="nav-item"><span class="icon">🪢</span> Ahorcado</a>`;
  }
}

async function cargarContadorCW() {
  if (Auth.getRol() !== "usuario") { document.getElementById("cw-usados").textContent = "—"; return; }
  const data = await apiFetch("/auth/perfil");
  if (data?.exito) document.getElementById("cw-usados").textContent = data.datos.crucigramas_usados;
}

async function cargarHistorialCW() {
  if (Auth.getRol() !== "usuario") { document.getElementById("tbody-cw").innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--gray);padding:20px;">Solo disponible para usuarios</td></tr>`; return; }
  const data = await apiFetch("/crucigramas");
  const tbody = document.getElementById("tbody-cw");
  if (!data?.exito) return;
  const cws = data.datos;
  if (!cws.length) { tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="icon">🧩</div><p>No has generado crucigramas aún</p></div></td></tr>`; return; }
  tbody.innerHTML = cws.map((c, i) => `<tr><td>${i+1}</td><td><strong>${c.titulo}</strong></td><td>${c.palabras.length} palabras</td><td>${formatFecha(c.creado_en)}</td><td><button class="btn btn-primary btn-sm" onclick="verCW(${c.id})" style="margin-right:6px;">👁️ Ver</button><button class="btn btn-secondary btn-sm" onclick="editarCW(${c.id})" style="margin-right:6px;">✏️ Editar</button><button class="btn btn-outline btn-sm" onclick="exportarIframeCW(${c.id},'${c.titulo.replace(/'/g,"\\'")}',${c.palabras.length})" style="margin-right:6px;">🔗 Exportar</button><button class="btn btn-danger btn-sm" onclick="eliminarCW(${c.id})">🗑️</button></td></tr>`).join("");
}

// ── PALABRAS ──────────────────────────────────────────────────────────────────
function addCwWord(word="", clue="") {
  const c = document.getElementById("cw-words-container");
  const row = document.createElement("div");
  row.style.cssText = "display:flex;gap:6px;margin-bottom:8px;align-items:center;";
  row.innerHTML = `<input type="text" placeholder="Palabra" maxlength="20" value="${word}" class="form-control" style="flex:1;"><input type="text" placeholder="Pista" value="${clue}" class="form-control" style="flex:2;"><button class="btn-remove" onclick="this.closest('div').remove()" style="background:#ff4d4d;color:white;border:none;border-radius:8px;padding:0 10px;height:42px;cursor:pointer;">✕</button>`;
  c.appendChild(row);
}
function getCwWords() {
  return [...document.querySelectorAll("#cw-words-container > div")].map(row => {
    const ins = row.querySelectorAll("input");
    const word = ins[0].value.trim().toUpperCase().replace(/\s+/g,"");
    const clue = ins[1].value.trim();
    return word.length >= 2 ? { word, clue: clue || word } : null;
  }).filter(Boolean);
}
function loadCwEjemplo() {
  const ex = [{word:"MEXICO",clue:"País de América del Norte"},{word:"OCEANO",clue:"Gran masa de agua salada"},{word:"CIENCIA",clue:"Estudio del mundo natural"},{word:"ESCUELA",clue:"Lugar donde se aprende"},{word:"LIBRO",clue:"Páginas encuadernadas"},{word:"LUNA",clue:"Satélite de la Tierra"},{word:"SOL",clue:"Estrella del sistema solar"},{word:"AGUA",clue:"Líquido esencial para la vida"}];
  document.getElementById("cw-words-container").innerHTML = "";
  ex.forEach(({word,clue}) => addCwWord(word,clue));
  document.getElementById("cw-titulo").value = "Conocimiento General";
  toast("Ejemplo cargado","success");
}

// ── ALGORITMO ─────────────────────────────────────────────────────────────────
async function generarCrucigrama() {
  const entries = getCwWords();
  if (entries.length < 2) { toast("Agrega al menos 2 palabras","error"); return; }
  const sorted = [...entries].sort((a,b) => b.word.length - a.word.length);
  let placed = null;
  for (let i=0;i<10;i++) { placed = tryBuild(sorted); if (placed?.length >= 2) break; }
  if (!placed?.length) { toast("No se pudo generar. Intenta con palabras que compartan letras.","error"); return; }

  let minR=Infinity,maxR=-Infinity,minC=Infinity,maxC=-Infinity;
  placed.forEach(({startR,startC,word,dir}) => {
    const eR=dir==="down"?startR+word.length-1:startR, eC=dir==="across"?startC+word.length-1:startC;
    minR=Math.min(minR,startR);maxR=Math.max(maxR,eR);minC=Math.min(minC,startC);maxC=Math.max(maxC,eC);
  });
  const pad=1, rows=maxR-minR+1+pad*2, cols=maxC-minC+1+pad*2;
  placed.forEach(p=>{p.startR=p.startR-minR+pad;p.startC=p.startC-minC+pad;});
  const grid=Array.from({length:rows},()=>Array(cols).fill(null));
  placed.forEach(({word,startR,startC,dir})=>{for(let i=0;i<word.length;i++){const r=dir==="down"?startR+i:startR,c=dir==="across"?startC+i:startC;grid[r][c]=word[i];}});
  numberWords(placed,rows,cols);
  cwState={grid,rows,cols,placedWords:placed,revealed:false};
  currentCWData={grid,placed,rows,cols};
  const titulo = document.getElementById("cw-titulo").value.trim()||"Crucigrama";
  renderCW(titulo);
  toast(`¡Crucigrama generado con ${placed.length} palabras! 🎉`,"success");
  // Autoguardado
  await autoGuardarCW(titulo, entries, currentCWData);
}

function tryBuild(entries) {
  const placed=[], gm={}, key=(r,c)=>`${r},${c}`;
  placeE(placed,gm,entries[0],50,50,"across");
  for(let i=1;i<entries.length;i++){
    const entry=entries[i]; let best=null;
    for(const p of placed){
      for(let pi=0;pi<p.word.length&&!best;pi++){
        const pr=p.dir==="down"?p.startR+pi:p.startR, pc=p.dir==="across"?p.startC+pi:p.startC;
        for(let ni=0;ni<entry.word.length&&!best;ni++){
          if(entry.word[ni]!==p.word[pi])continue;
          const nd=p.dir==="across"?"down":"across", nR=nd==="down"?pr-ni:pr, nC=nd==="across"?pc-ni:pc;
          if(canPlaceE(gm,entry.word,nR,nC,nd))best={startR:nR,startC:nC,dir:nd};
        }
      }
    }
    if(best)placeE(placed,gm,entry,best.startR,best.startC,best.dir);
  }
  return placed;
}
function canPlaceE(gm,word,sR,sC,dir){
  const key=(r,c)=>`${r},${c}`;
  for(let i=0;i<word.length;i++){
    const r=dir==="down"?sR+i:sR, c=dir==="across"?sC+i:sC;
    const ex=gm[key(r,c)]; if(ex&&ex!==word[i])return false;
    if(!ex){if(dir==="across"&&(gm[key(r-1,c)]||gm[key(r+1,c)]))return false;if(dir==="down"&&(gm[key(r,c-1)]||gm[key(r,c+1)]))return false;}
  }
  const bR=dir==="down"?sR-1:sR,bC=dir==="across"?sC-1:sC,aR=dir==="down"?sR+word.length:sR,aC=dir==="across"?sC+word.length:sC;
  if(gm[key(bR,bC)]||gm[key(aR,aC)])return false;
  return true;
}
function placeE(placed,gm,entry,sR,sC,dir){
  const key=(r,c)=>`${r},${c}`;
  for(let i=0;i<entry.word.length;i++){const r=dir==="down"?sR+i:sR,c=dir==="across"?sC+i:sC;gm[key(r,c)]=entry.word[i];}
  placed.push({...entry,startR:sR,startC:sC,dir,number:0});
}
function numberWords(placed,rows,cols){
  const sm={};placed.forEach(p=>{const k=`${p.startR},${p.startC}`;if(!sm[k])sm[k]=[];sm[k].push(p);});
  let n=1;for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const k=`${r},${c}`;if(sm[k]){sm[k].forEach(p=>p.number=n);n++;}}
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderCW(titulo) {
  document.getElementById("cw-placeholder").style.display="none";
  const res=document.getElementById("cw-result"); res.style.display="block";
  document.getElementById("cw-result-title").textContent=titulo;
  const {grid,rows,cols,placedWords}=cwState;
  const gridEl=document.getElementById("cw-grid");
  gridEl.style.gridTemplateColumns=`repeat(${cols},36px)`; gridEl.innerHTML="";
  const nm={};placedWords.forEach(p=>{nm[`${p.startR},${p.startC}`]=p.number;});
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const cell=document.createElement("div"); cell.className="cw-cell"; cell.dataset.r=r; cell.dataset.c=c;
    if(grid[r][c]===null){cell.classList.add("black");}
    else{
      const inp=document.createElement("input"); inp.type="text"; inp.maxLength=1; inp.dataset.answer=grid[r][c];
      inp.addEventListener("input",cwInput); inp.addEventListener("keydown",cwKeydown); cell.appendChild(inp);
      if(nm[`${r},${c}`]){const n=document.createElement("span");n.className="num";n.textContent=nm[`${r},${c}`];cell.appendChild(n);}
    }
    gridEl.appendChild(cell);
  }
  const across=placedWords.filter(p=>p.dir==="across").sort((a,b)=>a.number-b.number);
  const down=placedWords.filter(p=>p.dir==="down").sort((a,b)=>a.number-b.number);
  renderClues("cw-across",across); renderClues("cw-down",down);
}
function renderClues(id,words){
  const el=document.getElementById(id); el.innerHTML="";
  if(!words.length){el.innerHTML=`<p style="color:var(--gray);font-size:0.85rem;">—</p>`;return;}
  words.forEach(({number,clue})=>{const d=document.createElement("div");d.className="clue-item";d.innerHTML=`<span class="clue-num">${number}.</span><span class="clue-text">${clue}</span>`;el.appendChild(d);});
}
function cwInput(e){const i=e.target;i.value=i.value.toUpperCase().replace(/[^A-ZÁÉÍÓÚÑ]/g,"");if(i.value.length===1)moveFocus(i,1);}
function cwKeydown(e){
  if(e.key==="Backspace"&&!e.target.value)moveFocus(e.target,-1);
  if(e.key==="ArrowRight"){e.preventDefault();moveFocusDir(e.target,0,1);}
  if(e.key==="ArrowLeft"){e.preventDefault();moveFocusDir(e.target,0,-1);}
  if(e.key==="ArrowDown"){e.preventDefault();moveFocusDir(e.target,1,0);}
  if(e.key==="ArrowUp"){e.preventDefault();moveFocusDir(e.target,-1,0);}
}
function moveFocus(inp,d){const all=[...document.querySelectorAll(".cw-cell:not(.black) input")];const n=all[all.indexOf(inp)+d];if(n)n.focus();}
function moveFocusDir(inp,dr,dc){const cell=inp.closest(".cw-cell");const t=document.querySelector(`.cw-cell[data-r="${+cell.dataset.r+dr}"][data-c="${+cell.dataset.c+dc}"] input`);if(t)t.focus();}
function checkCW(){
  const inputs=[...document.querySelectorAll(".cw-cell:not(.black) input")];
  let ok=0,total=0,empty=0;
  inputs.forEach(i=>{total++;if(!i.value){empty++;return;}i.style.color=i.value.toUpperCase()===i.dataset.answer?"var(--secondary)":"#dc3545";if(i.value.toUpperCase()===i.dataset.answer)ok++;});
  if(empty>0)toast(`Faltan ${empty} letras`);else if(ok===total)toast("🏆 ¡Crucigrama completado!","success");else toast(`Correctas: ${ok}/${total}`);
}
function clearCW(){document.querySelectorAll(".cw-cell:not(.black) input").forEach(i=>{i.value="";i.style.color="";});cwState.revealed=false;toast("Crucigrama limpiado");}

// ── GUARDAR ───────────────────────────────────────────────────────────────────
async function autoGuardarCW(titulo, palabras, gridData) {
  if (Auth.getRol() !== "usuario") return;
  const status = document.getElementById("cw-autosave-status");
  if (status) status.textContent = "💾 Guardando automáticamente...";
  const data = await apiFetch("/crucigramas", { method:"POST", body: JSON.stringify({ titulo, palabras, grid_data: gridData }) });
  if (!data?.exito) {
    if (status) status.textContent = "⚠️ " + (data?.mensaje || "No se pudo autoguardar");
    return;
  }
  if (status) status.textContent = `✅ Guardado automáticamente (ID: ${data.datos.id})`;
  await cargarContadorCW(); await cargarHistorialCW();
}
// ── VER Y EDITAR ──────────────────────────────────────────────────────────────
async function verCW(id) {
  const data = await apiFetch(`/crucigramas/${id}`);
  if (!data?.exito) { toast("Error al cargar","error"); return; }
  const c = data.datos;
  if (!c.grid_data) { toast("Este crucigrama no tiene datos de cuadrícula","error"); return; }
  cwState = { grid: c.grid_data.grid, rows: c.grid_data.rows, cols: c.grid_data.cols, placedWords: c.grid_data.placed, revealed: false };
  currentCWData = c.grid_data;
  renderCW(c.titulo);
  toast("Crucigrama cargado ✓","success");
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function editarCW(id) {
  const data = await apiFetch(`/crucigramas/${id}`);
  if (!data?.exito) { toast("Error al cargar","error"); return; }
  const c = data.datos;
  document.getElementById("cw-titulo").value = c.titulo;
  document.getElementById("cw-words-container").innerHTML = "";
  
  // Las palabras vienen como array de objetos {word, clue}
  if (Array.isArray(c.palabras)) {
    c.palabras.forEach(p => {
      if (typeof p === 'object' && p.word) {
        addCwWord(p.word, p.clue || '');
      } else if (typeof p === 'string') {
        addCwWord(p, '');
      }
    });
  }
  
  if (c.grid_data) {
    cwState = { grid: c.grid_data.grid, rows: c.grid_data.rows, cols: c.grid_data.cols, placedWords: c.grid_data.placed, revealed: false };
    currentCWData = c.grid_data;
    renderCW(c.titulo);
  }
  
  toast("Listo para editar ✏️","success");
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function eliminarCW(id){
  if(!confirm("¿Eliminar este crucigrama?"))return;
  const data=await apiFetch(`/crucigramas/${id}`,{method:"DELETE"});
  if(!data?.exito){toast("Error al eliminar","error");return;}
  toast("Crucigrama eliminado","success"); await cargarHistorialCW(); await cargarContadorCW();
}

// ── EXPORTAR IFRAME ───────────────────────────────────────────────────────────
function exportarIframeCW(id, titulo, numPalabras) {
  const baseUrl = window.location.origin + window.location.pathname.replace("crucigramas.html","");
  const iframeUrl = `${baseUrl}visor_crucigrama.html?id=${id}`;
  const alto = numPalabras <= 5 ? 520 : numPalabras <= 10 ? 690 : 820;
  const codigo = `<iframe allow="fullscreen; autoplay; allow-top-navigation-by-user-activation" allowfullscreen width="795" height="${alto}" frameborder="0" src="${iframeUrl}" title="${titulo}"></iframe>`;
  mostrarModalIframe(titulo, codigo);
}

function mostrarModalIframe(titulo, codigo) {
  let modal = document.getElementById("modal-iframe");
  if (!modal) {
    modal = document.createElement("div");
    modal.id = "modal-iframe";
    modal.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;";
    modal.innerHTML = `
      <div style="background:white;border-radius:16px;padding:32px;max-width:640px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,0.2);">
        <h3 id="modal-iframe-titulo" style="margin-bottom:16px;font-size:1.1rem;">🔗 Código de inserción</h3>
        <p style="font-size:0.88rem;color:#666;margin-bottom:12px;">Copia este código y pégalo en tu plataforma educativa (Moodle, Google Sites, etc.):</p>
        <textarea id="modal-iframe-code" readonly style="width:100%;height:110px;font-family:monospace;font-size:0.8rem;border:1px solid #ddd;border-radius:8px;padding:10px;resize:none;background:#f8f9ff;"></textarea>
        <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end;">
          <button onclick="copiarCodigoIframe()" class="btn btn-primary btn-sm">📋 Copiar código</button>
          <button onclick="document.getElementById('modal-iframe').remove()" class="btn btn-outline btn-sm">Cerrar</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    modal.addEventListener("click", e => { if (e.target === modal) modal.remove(); });
  }
  document.getElementById("modal-iframe-titulo").textContent = `🔗 Exportar: ${titulo}`;
  document.getElementById("modal-iframe-code").value = codigo;
}

function copiarCodigoIframe() {
  const ta = document.getElementById("modal-iframe-code");
  ta.select(); ta.setSelectionRange(0, 99999);
  navigator.clipboard?.writeText(ta.value).then(() => toast("¡Código copiado! 📋","success")).catch(() => { document.execCommand("copy"); toast("¡Código copiado! 📋","success"); });
}
</script>
</body>
</html>
