<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EducaTec | Iniciar Sesión</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(135deg, #0066cc 0%, #004499 50%, #00a86b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: white; border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .emoji { font-size: 3.5rem; display: block; margin-bottom: 8px; }
    .login-logo h1 { font-size: 1.8rem; font-weight: 800; color: var(--dark); }
    .login-logo p  { color: var(--gray); font-size: 0.9rem; margin-top: 4px; }
    .tabs { display: flex; background: #f0f4f8; border-radius: 50px; padding: 4px; margin-bottom: 28px; }
    .tab-btn { flex: 1; padding: 9px; border: none; border-radius: 50px; background: transparent; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.25s; color: var(--gray); }
    .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .login-footer { text-align: center; margin-top: 20px; font-size: 0.82rem; color: var(--gray); }
    .tecnm-badge { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee; font-size: 0.78rem; color: #aaa; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <img src="EducatecLog.jpg" alt="EducaTec" style="height:160px;width:auto;object-fit:contain;margin-bottom:8px;border-radius:12px;">
      <p>Tecnológico Nacional de México</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-maestro">👨‍💼 Administrador</button>
      <button class="tab-btn" id="tab-usuario">👤 Usuario</button>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Usuario <span id="rol-label" style="color:var(--primary)">(Maestro)</span></label>
        <input type="text" id="username" class="form-control" placeholder="Ingresa tu usuario" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" id="btn-login" class="btn btn-primary btn-block" style="margin-top:8px;border-radius:12px;padding:14px;">
        Ingresar
      </button>
    </form>

    <div class="tecnm-badge">
      🏫 Educatec • TecNM 2026
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
