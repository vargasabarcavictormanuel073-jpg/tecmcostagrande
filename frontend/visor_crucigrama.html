<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crucigrama | EducaTec</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 16px; }

    /* ── HEADER ── */
    .header { width: 100%; max-width: 760px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    h2 { font-size: 1.25rem; color: #2d3a8c; }

    /* ── CRONÓMETRO ── */
    .timer-box {
      display: flex; align-items: center; gap: 8px;
      background: white; border: 2px solid #e0e7ff;
      border-radius: 12px; padding: 6px 16px;
      box-shadow: 0 2px 8px rgba(45,58,140,0.08);
    }
    .timer-icon { font-size: 1.1rem; }
    .timer-display {
      font-size: 1.4rem; font-weight: 800;
      color: #2d3a8c; font-variant-numeric: tabular-nums;
      letter-spacing: 1px; min-width: 60px; text-align: center;
    }
    .timer-display.warning { color: #d97706; }
    .timer-display.danger  { color: #dc2626; animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* ── PROGRESO ── */
    .progress-wrap { width: 100%; max-width: 760px; margin-bottom: 12px; }
    .progress-bar-bg { height: 8px; background: #e0e7ff; border-radius: 50px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #2d3a8c, #28a745); border-radius: 50px; transition: width 0.4s ease; width: 0%; }
    .progress-label { font-size: 0.78rem; color: #6b7280; margin-top: 4px; text-align: right; }

    /* ── GRID ── */
    .crossword-grid { display: inline-grid; gap: 2px; }
    .cw-cell { width: 34px; height: 34px; position: relative; background: white; border: 2px solid #c7d2fe; border-radius: 4px; transition: border-color 0.15s; }
    .cw-cell.black { background: #1e293b; border-color: #1e293b; }
    .cw-cell.correct { border-color: #28a745; background: #f0fdf4; }
    .cw-cell.wrong   { border-color: #dc2626; background: #fef2f2; }
    .cw-cell input {
      width: 100%; height: 100%; border: none; background: transparent;
      text-align: center; font-weight: 700; font-size: 0.9rem;
      text-transform: uppercase; color: #1e293b; padding: 0; cursor: pointer;
    }
    .cw-cell input:focus { outline: none; background: #fef9c3; }
    .cw-cell .num { position: absolute; top: 1px; left: 2px; font-size: 0.46rem; font-weight: 700; color: #2d3a8c; line-height: 1; pointer-events: none; }

    /* ── PISTAS ── */
    .clues { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 16px; width: 100%; max-width: 760px; }
    .clue-col h4 { font-size: 0.9rem; color: #2d3a8c; margin-bottom: 8px; font-weight: 700; }
    .clue-item { display: flex; gap: 7px; margin-bottom: 6px; font-size: 0.83rem; cursor: pointer; padding: 3px 6px; border-radius: 6px; transition: background 0.1s; }
    .clue-item:hover { background: #e0e7ff; }
    .clue-item.done { opacity: 0.45; text-decoration: line-through; }
    .clue-num { font-weight: 700; color: #2d3a8c; min-width: 22px; }
    .clue-text { color: #555; }

    /* ── BOTONES ── */
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; justify-content: center; }
    .btn { padding: 8px 18px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary  { background: #2d3a8c; color: white; }
    .btn-secondary{ background: #28a745; color: white; }
    .btn-outline  { background: transparent; border: 2px solid #2d3a8c; color: #2d3a8c; }
    .btn-gray     { background: #e5e7eb; color: #374151; }

    /* ── RESULTADO FINAL ── */
    .resultado-final {
      display: none; flex-direction: column; align-items: center; gap: 10px;
      background: white; border-radius: 16px; padding: 28px 32px;
      box-shadow: 0 8px 32px rgba(45,58,140,0.15);
      margin-top: 16px; text-align: center; max-width: 400px; width: 100%;
      animation: fadeUp 0.4s ease;
    }
    .resultado-final.show { display: flex; }
    .resultado-emoji { font-size: 3.5rem; }
    .resultado-titulo { font-size: 1.3rem; font-weight: 800; color: #2d3a8c; }
    .resultado-tiempo { font-size: 2rem; font-weight: 800; color: #28a745; }
    .resultado-sub { font-size: 0.88rem; color: #6b7280; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    /* ── CONFETI ── */
    .confeti-piece {
      position: fixed; border-radius: 2px;
      animation: caer linear forwards;
      pointer-events: none; z-index: 9999;
    }
    @keyframes caer {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .msg { text-align: center; padding: 60px 20px; color: #888; font-size: 1rem; }
    .branding { font-size: 0.72rem; color: #bbb; margin-top: 16px; }
    .branding a { color: #2d3a8c; text-decoration: none; font-weight: 600; }

    @media (max-width: 500px) {
      .clues { grid-template-columns: 1fr; }
      .cw-cell { width: 28px; height: 28px; }
      .cw-cell input { font-size: 0.78rem; }
    }
  </style>
</head>
<body>
  <div id="app"><div class="msg">⏳ Cargando crucigrama...</div></div>

  <script>
    const API = "/api";
    let cwState = { grid:[], rows:0, cols:0, placedWords:[], revealed:false };

    // ── CRONÓMETRO ────────────────────────────────────────────────
    let timerSecs = 0, timerInterval = null, timerStarted = false, timerStopped = false;

    function startTimer() {
      if (timerStarted) return;
      timerStarted = true;
      timerInterval = setInterval(() => {
        timerSecs++;
        updateTimerDisplay();
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerStopped = true;
    }

    function updateTimerDisplay() {
      const el = document.getElementById("timer-display");
      if (!el) return;
      const m = String(Math.floor(timerSecs / 60)).padStart(2, "0");
      const s = String(timerSecs % 60).padStart(2, "0");
      el.textContent = `${m}:${s}`;
      el.className = "timer-display" + (timerSecs >= 300 ? " danger" : timerSecs >= 120 ? " warning" : "");
    }

    function formatTiempo(secs) {
      const m = Math.floor(secs / 60), s = secs % 60;
      if (m === 0) return `${s} segundos`;
      return `${m} min ${s > 0 ? s + " seg" : ""}`;
    }

    // ── CONFETI ───────────────────────────────────────────────────
    function lanzarConfeti() {
      const colores = ["#2d3a8c","#28a745","#fbbf24","#ef4444","#8b5cf6","#06b6d4","#f97316"];
      for (let i = 0; i < 80; i++) {
        const p = document.createElement("div");
        p.className = "confeti-piece";
        p.style.cssText = `
          left: ${Math.random() * 100}vw;
          background: ${colores[Math.floor(Math.random() * colores.length)]};
          width: ${6 + Math.random() * 8}px;
          height: ${6 + Math.random() * 8}px;
          animation-duration: ${1.5 + Math.random() * 2}s;
          animation-delay: ${Math.random() * 0.8}s;
          border-radius: ${Math.random() > 0.5 ? "50%" : "2px"};
        `;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 4000);
      }
    }

    // ── INIT ──────────────────────────────────────────────────────
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      if (!id) { document.getElementById("app").innerHTML = '<div class="msg">❌ No se especificó un crucigrama.</div>'; return; }

      const token = localStorage.getItem("ep_token");
      const headers = { "Content-Type": "application/json" };
      if (token) headers["Authorization"] = `Bearer ${token}`;

      try {
        const res = await fetch(`${API}/crucigramas/${id}`, { headers });
        if (!res.ok) throw new Error();
        const data = await res.json();
        if (!data.exito || !data.datos.grid_data) throw new Error();
        const c = data.datos;
        cwState = { grid: c.grid_data.grid, rows: c.grid_data.rows, cols: c.grid_data.cols, placedWords: c.grid_data.placed, revealed: false };
        renderApp(c);
      } catch {
        document.getElementById("app").innerHTML = '<div class="msg">❌ No se pudo cargar el crucigrama.</div>';
      }
    }

    // ── RENDER ────────────────────────────────────────────────────
    function renderApp(c) {
      const { grid, rows, cols, placedWords } = cwState;
      const total = placedWords.length;

      document.getElementById("app").innerHTML = `
        <div class="header">
          <h2>🧩 ${c.titulo}</h2>
          <div class="timer-box">
            <span class="timer-icon">⏱️</span>
            <span class="timer-display" id="timer-display">00:00</span>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
          <div class="progress-label" id="progress-label">0 / ${total} palabras</div>
        </div>

        <div style="overflow-x:auto;">
          <div class="crossword-grid" id="cw-grid" style="grid-template-columns:repeat(${cols},34px)"></div>
        </div>

        <div class="clues">
          <div class="clue-col"><h4>➡️ Horizontales</h4><div id="cw-across"></div></div>
          <div class="clue-col"><h4>⬇️ Verticales</h4><div id="cw-down"></div></div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" onclick="checkCW()">✅ Verificar</button>
          <button class="btn btn-secondary" onclick="revealCW()">💡 Revelar</button>
          <button class="btn btn-outline" onclick="clearCW()">🗑️ Limpiar</button>
          <button class="btn btn-gray" onclick="reiniciar()">🔄 Reiniciar</button>
        </div>

        <div class="resultado-final" id="resultado-final">
          <div class="resultado-emoji">🏆</div>
          <div class="resultado-titulo">¡Crucigrama completado!</div>
          <div class="resultado-tiempo" id="resultado-tiempo">—</div>
          <div class="resultado-sub" id="resultado-sub">—</div>
          <button class="btn btn-primary" onclick="reiniciar()" style="margin-top:8px;">🔄 Jugar de nuevo</button>
        </div>

        <div class="branding"><img src="/EducatecLog.jpg" alt="EducaTec" style="height:22px;vertical-align:middle;border-radius:4px;margin-right:5px;">Actividad creada con <a href="#" target="_blank">EducaTec</a></div>`;

      // Grid
      const nm = {};
      placedWords.forEach(p => { nm[`${p.startR},${p.startC}`] = p.number; });
      const gridEl = document.getElementById("cw-grid");
      for (let r = 0; r < rows; r++) for (let cc = 0; cc < cols; cc++) {
        const cell = document.createElement("div");
        cell.className = "cw-cell"; cell.dataset.r = r; cell.dataset.c = cc;
        if (grid[r][cc] === null) {
          cell.classList.add("black");
        } else {
          const inp = document.createElement("input");
          inp.type = "text"; inp.maxLength = 1; inp.dataset.answer = grid[r][cc];
          inp.addEventListener("focus", () => startTimer());
          inp.addEventListener("input", cwInput);
          inp.addEventListener("keydown", cwKeydown);
          cell.appendChild(inp);
          if (nm[`${r},${cc}`]) {
            const n = document.createElement("span"); n.className = "num"; n.textContent = nm[`${r},${cc}`]; cell.appendChild(n);
          }
        }
        gridEl.appendChild(cell);
      }

      // Pistas
      const across = placedWords.filter(p => p.dir === "across").sort((a,b) => a.number - b.number);
      const down   = placedWords.filter(p => p.dir === "down").sort((a,b) => a.number - b.number);
      renderClues("cw-across", across);
      renderClues("cw-down", down);
    }

    function renderClues(id, words) {
      const el = document.getElementById(id); el.innerHTML = "";
      if (!words.length) { el.innerHTML = '<p style="color:#aaa;font-size:0.82rem;">—</p>'; return; }
      words.forEach(({number, clue, word}) => {
        const d = document.createElement("div");
        d.className = "clue-item"; d.dataset.word = word;
        d.innerHTML = `<span class="clue-num">${number}.</span><span class="clue-text">${clue}</span>`;
        el.appendChild(d);
      });
    }

    // ── INPUT ─────────────────────────────────────────────────────
    function cwInput(e) {
      const i = e.target;
      i.value = i.value.toUpperCase().replace(/[^A-ZÁÉÍÓÚÑ]/g, "");
      if (i.value.length === 1) moveFocus(i, 1);
      checkWordComplete();
    }

    function cwKeydown(e) {
      if (e.key === "Backspace" && !e.target.value) moveFocus(e.target, -1);
      if (e.key === "ArrowRight") { e.preventDefault(); moveFocusDir(e.target, 0, 1); }
      if (e.key === "ArrowLeft")  { e.preventDefault(); moveFocusDir(e.target, 0, -1); }
      if (e.key === "ArrowDown")  { e.preventDefault(); moveFocusDir(e.target, 1, 0); }
      if (e.key === "ArrowUp")    { e.preventDefault(); moveFocusDir(e.target, -1, 0); }
    }

    function moveFocus(inp, d) {
      const all = [...document.querySelectorAll(".cw-cell:not(.black) input")];
      const n = all[all.indexOf(inp) + d]; if (n) n.focus();
    }
    function moveFocusDir(inp, dr, dc) {
      const cell = inp.closest(".cw-cell");
      const t = document.querySelector(`.cw-cell[data-r="${+cell.dataset.r+dr}"][data-c="${+cell.dataset.c+dc}"] input`);
      if (t) t.focus();
    }

    // ── VERIFICAR PALABRA COMPLETA ────────────────────────────────
    function checkWordComplete() {
      let completadas = 0;
      cwState.placedWords.forEach(p => {
        let ok = true;
        for (let i = 0; i < p.word.length; i++) {
          const r = p.dir === "down" ? p.startR + i : p.startR;
          const c = p.dir === "across" ? p.startC + i : p.startC;
          const inp = document.querySelector(`.cw-cell[data-r="${r}"][data-c="${c}"] input`);
          if (!inp || inp.value.toUpperCase() !== p.word[i]) { ok = false; break; }
        }
        if (ok) {
          completadas++;
          // Marcar celdas de la palabra como correctas
          for (let i = 0; i < p.word.length; i++) {
            const r = p.dir === "down" ? p.startR + i : p.startR;
            const c = p.dir === "across" ? p.startC + i : p.startC;
            const cell = document.querySelector(`.cw-cell[data-r="${r}"][data-c="${c}"]`);
            if (cell) cell.classList.add("correct");
          }
          // Tachar pista
          const clueEl = document.querySelector(`.clue-item[data-word="${p.word}"]`);
          if (clueEl) clueEl.classList.add("done");
        }
      });

      // Actualizar progreso
      const total = cwState.placedWords.length;
      const pct = Math.round((completadas / total) * 100);
      const fill = document.getElementById("progress-fill");
      const label = document.getElementById("progress-label");
      if (fill) fill.style.width = pct + "%";
      if (label) label.textContent = `${completadas} / ${total} palabras`;

      if (completadas === total) completar();
    }

    // ── VERIFICAR TODO ────────────────────────────────────────────
    function checkCW() {
      const inputs = [...document.querySelectorAll(".cw-cell:not(.black) input")];
      let ok = 0, total = 0, empty = 0;
      inputs.forEach(i => {
        total++;
        if (!i.value) { empty++; return; }
        const correcto = i.value.toUpperCase() === i.dataset.answer;
        i.style.color = correcto ? "#28a745" : "#dc2626";
        const cell = i.closest(".cw-cell");
        if (cell) { cell.classList.toggle("correct", correcto); cell.classList.toggle("wrong", !correcto); }
        if (correcto) ok++;
      });
      if (empty > 0) alert(`Faltan ${empty} letras por completar`);
      else if (ok === total) completar();
      else alert(`Correctas: ${ok} de ${total} letras`);
    }

    function completar() {
      if (timerStopped) return;
      stopTimer();
      lanzarConfeti();
      const res = document.getElementById("resultado-final");
      if (res) {
        res.classList.add("show");
        document.getElementById("resultado-tiempo").textContent = formatTiempo(timerSecs);
        const rating = timerSecs < 60 ? "⚡ ¡Velocidad increíble!" : timerSecs < 180 ? "🌟 ¡Excelente tiempo!" : timerSecs < 360 ? "👍 ¡Buen trabajo!" : "💪 ¡Lo lograste!";
        document.getElementById("resultado-sub").textContent = rating;
      }
    }

    function revealCW() {
      cwState.revealed = !cwState.revealed;
      document.querySelectorAll(".cw-cell:not(.black) input").forEach(i => {
        if (cwState.revealed) { i.value = i.dataset.answer; i.style.color = "#2d3a8c"; }
        else { i.value = ""; i.style.color = ""; }
      });
      if (cwState.revealed) checkWordComplete();
    }

    function clearCW() {
      document.querySelectorAll(".cw-cell:not(.black) input").forEach(i => { i.value = ""; i.style.color = ""; });
      document.querySelectorAll(".cw-cell").forEach(c => { c.classList.remove("correct","wrong"); });
      document.querySelectorAll(".clue-item").forEach(c => c.classList.remove("done"));
      cwState.revealed = false;
      const fill = document.getElementById("progress-fill");
      const label = document.getElementById("progress-label");
      if (fill) fill.style.width = "0%";
      if (label) label.textContent = `0 / ${cwState.placedWords.length} palabras`;
    }

    function reiniciar() { location.reload(); }

    init();
  </script>
</body>
</html>
