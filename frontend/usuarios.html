<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios | EducaTec</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="EducatecLog.jpg" alt="EducaTec" style="height:44px;width:auto;object-fit:contain;border-radius:8px;flex-shrink:0;">
      <div><div class="logo-text">EducaTec</div><div class="logo-sub">Panel Maestro</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <a href="dashboard.html" class="nav-item"><span class="icon">📊</span> Dashboard</a>
      <a href="usuarios.html"  class="nav-item active"><span class="icon">👥</span> Mis Usuarios</a>
      <a href="actividades.html" class="nav-item"><span class="icon">📋</span> Actividades</a>
      <div class="nav-section">Herramientas</div>
      <a href="sopas.html" class="nav-item"><span class="icon">🔠</span> Sopas de Letras</a>
      <a href="crucigramas.html" class="nav-item"><span class="icon">🧩</span> Crucigramas</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebar-user-avatar">M</div>
        <div><div class="user-name" id="sidebar-user-name">Maestro</div><div class="user-role" id="sidebar-user-role">Maestro</div></div>
      </div>
      <button onclick="cerrarSesion()" class="btn btn-danger btn-sm btn-block" style="margin-top:12px;">🚪 Cerrar Sesión</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">👥 Mis Usuarios</div>
      <div class="topbar-actions">
        <span id="contador-usuarios" style="font-size:0.88rem;color:var(--gray);"></span>
        <button class="btn btn-primary btn-sm" onclick="abrirModal('modal-crear')">+ Nuevo Usuario</button>
      </div>
    </div>
    <div class="page-content">

      <div class="card">
        <div class="table-wrap">
          <table id="tabla-usuarios">
            <thead>
              <tr>
                <th>#</th><th>Usuario</th><th>Nombre</th><th>Sopas</th><th>Crucigramas</th><th>Estado</th><th>Creado</th><th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody-usuarios">
              <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gray);">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL CREAR -->
<div class="modal-overlay" id="modal-crear">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">➕ Nuevo Usuario</span>
      <button class="modal-close" onclick="cerrarModal('modal-crear')">✕</button>
    </div>
    <form id="form-crear">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" id="c-nombre" class="form-control" placeholder="Ej: Juan Pérez" required>
      </div>
      <div class="form-group">
        <label>Nombre de usuario</label>
        <input type="text" id="c-username" class="form-control" placeholder="Ej: juan123" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="c-password" class="form-control" placeholder="Mínimo 4 caracteres" required>
      </div>
      <div class="form-group">
        <label>Email (opcional)</label>
        <input type="email" id="c-email" class="form-control" placeholder="correo@ejemplo.com">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-gray" onclick="cerrarModal('modal-crear')">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btn-crear">Crear Usuario</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="modal-editar">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✏️ Editar Usuario</span>
      <button class="modal-close" onclick="cerrarModal('modal-editar')">✕</button>
    </div>
    <form id="form-editar">
      <input type="hidden" id="e-id">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" id="e-nombre" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Email (opcional)</label>
        <input type="email" id="e-email" class="form-control">
      </div>
      <div class="form-group">
        <label>Nueva contraseña (dejar vacío para no cambiar)</label>
        <input type="password" id="e-password" class="form-control" placeholder="Nueva contraseña">
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="e-activo" class="form-control">
          <option value="1">Activo</option>
          <option value="0">Inactivo</option>
        </select>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-gray" onclick="cerrarModal('modal-editar')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/app.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  if (!protegerRuta("maestro")) return;
  renderSidebarUser();
  await cargarUsuarios();

  // CREAR
  document.getElementById("form-crear").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("btn-crear");
    btn.disabled = true;
    const data = await apiFetch("/usuarios", {
      method: "POST",
      body: JSON.stringify({
        nombre:   document.getElementById("c-nombre").value.trim(),
        username: document.getElementById("c-username").value.trim(),
        password: document.getElementById("c-password").value,
        email:    document.getElementById("c-email").value.trim(),
      }),
    });
    btn.disabled = false;
    if (!data?.exito) { toast(data?.mensaje || "Error al crear usuario", "error"); return; }
    toast("Usuario creado correctamente", "success");
    cerrarModal("modal-crear");
    document.getElementById("form-crear").reset();
    await cargarUsuarios();
  });

  // EDITAR
  document.getElementById("form-editar").addEventListener("submit", async (e) => {
    e.preventDefault();
    const id = document.getElementById("e-id").value;
    const data = await apiFetch(`/usuarios/${id}`, {
      method: "PUT",
      body: JSON.stringify({
        nombre:   document.getElementById("e-nombre").value.trim(),
        email:    document.getElementById("e-email").value.trim(),
        password: document.getElementById("e-password").value,
        activo:   parseInt(document.getElementById("e-activo").value),
      }),
    });
    if (!data?.exito) { toast(data?.mensaje || "Error al actualizar", "error"); return; }
    toast("Usuario actualizado", "success");
    cerrarModal("modal-editar");
    await cargarUsuarios();
  });
});

async function cargarUsuarios() {
  const data = await apiFetch("/usuarios");
  const tbody = document.getElementById("tbody-usuarios");
  const contador = document.getElementById("contador-usuarios");

  if (!data?.exito) { tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--danger);">Error al cargar</td></tr>`; return; }

  const usuarios = data.datos;
  contador.textContent = `${usuarios.length} / 15 usuarios`;

  if (!usuarios.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">👥</div><p>No hay usuarios creados aún</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = usuarios.map((u, i) => `
    <tr>
      <td>${i + 1}</td>
      <td><strong>${u.username}</strong></td>
      <td>${u.nombre}</td>
      <td><span class="badge badge-info">${u.sopas} / 30</span></td>
      <td><span class="badge badge-info">${u.crucigramas} / 20</span></td>
      <td><span class="badge ${u.activo ? 'badge-success' : 'badge-danger'}">${u.activo ? 'Activo' : 'Inactivo'}</span></td>
      <td>${formatFecha(u.creado_en)}</td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="editarUsuario(${u.id},'${u.nombre}','${u.email||''}',${u.activo})">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="eliminarUsuario(${u.id},'${u.nombre}')">🗑️</button>
      </td>
    </tr>
  `).join("");
}

function editarUsuario(id, nombre, email, activo) {
  document.getElementById("e-id").value = id;
  document.getElementById("e-nombre").value = nombre;
  document.getElementById("e-email").value = email;
  document.getElementById("e-activo").value = activo;
  document.getElementById("e-password").value = "";
  abrirModal("modal-editar");
}

async function eliminarUsuario(id, nombre) {
  if (!confirm(`¿Eliminar al usuario "${nombre}"? Esta acción no se puede deshacer.`)) return;
  const data = await apiFetch(`/usuarios/${id}`, { method: "DELETE" });
  if (!data?.exito) { toast(data?.mensaje || "Error al eliminar", "error"); return; }
  toast("Usuario eliminado", "success");
  await cargarUsuarios();
}
</script>
</body>
</html>
